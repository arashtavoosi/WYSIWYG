<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WYSIWYG Core Baseline</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e8;
            --panel: rgba(255, 252, 245, 0.95);
            --line: #d5cab8;
            --text: #1c1917;
            --muted: #6b6257;
            --accent: #b45309;
            --accent-soft: #f3d7a8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 20px;
            background:
                radial-gradient(circle at top left, rgba(249, 115, 22, 0.12), transparent 32%),
                linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
            color: var(--text);
            font-family: Georgia, 'Times New Roman', serif;
        }

        .shell {
            max-width: 840px;
            margin: 0 auto;
        }

        .heading {
            margin: 0 0 18px;
        }

        .heading h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .heading p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .editor-frame {
            border: 1px solid var(--line);
            border-radius: 20px;
            overflow: hidden;
            background: var(--panel);
            box-shadow: 0 18px 60px rgba(28, 25, 23, 0.08);
            backdrop-filter: blur(8px);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 248, 238, 0.9);
        }

        .toolbar button {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 14px;
            background: #fff;
            color: var(--text);
            font: inherit;
            cursor: pointer;
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, transform 120ms ease;
        }

        .toolbar label,
        .toolbar select,
        .toolbar input {
            font: inherit;
        }

        .toolbar select,
        .toolbar input[type="color"] {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: var(--text);
            min-height: 38px;
            padding: 0 12px;
        }

        .toolbar input[type="color"] {
            width: 44px;
            padding: 4px;
        }

        .toolbar .control-group {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar button:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .toolbar button.is-active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: #7c2d12;
        }

        .editor {
            min-height: 260px;
            padding: 22px;
            outline: none;
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .status {
            display: flex;
            gap: 18px;
            padding: 14px 22px 20px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .status strong {
            color: var(--text);
        }

        @media (max-width: 640px) {
            body {
                padding: 18px 14px;
            }

            .status {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>

</head>

<body>
    <div class="shell">
        <div class="heading">
            <h1>Core Baseline</h1>
            <p>The smallest end-to-end demo now runs against <code>createEditorCore</code> directly.</p>
        </div>

        <div class="editor-frame">
            <div id="toolbar" class="toolbar">
                <button type="button" data-inline="bold">Bold</button>
                <button type="button" data-inline="italic">Italic</button>
                <button type="button" data-inline="underline">Underline</button>
                <button type="button" data-block="heading" data-level="2">H2</button>
                <button type="button" data-block="blockquote">Quote</button>
                <button type="button" data-list="ul">Bullets</button>
                <button type="button" data-list="ol">Numbers</button>
                <span class="control-group">
                    <label for="colorControl">Color</label>
                    <input id="colorControl" type="color" data-style="color" value="#000000">
                </span>
                <span class="control-group">
                    <label for="fontControl">Font</label>
                    <select id="fontControl" data-style="fontFamily">
                        <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                        <option value="'Helvetica Neue', Arial, sans-serif">Helvetica</option>
                        <option value="'Courier New', monospace">Courier</option>
                    </select>
                </span>
                <span class="control-group">
                    <label for="lineHeightControl">Line</label>
                    <select id="lineHeightControl" data-style="lineHeight">
                        <option value="1.4">1.4</option>
                        <option value="1.6" selected>1.6</option>
                        <option value="1.8">1.8</option>
                        <option value="2">2.0</option>
                    </select>
                </span>
                <button type="button" data-action="link">Link</button>
                <button type="button" data-action="unlink">Unlink</button>
                <button type="button" data-action="image">Image</button>
                <button type="button" data-action="table">Table</button>
                <button type="button" data-action="br">BR</button>
                <button type="button" data-action="hr">HR</button>
                <button type="button" data-action="clear">Clear Formatting</button>
            </div>

            <div id="editor" class="editor" contenteditable="true">
                <p>This is some <strong>bold</strong> and <em>italic</em> text.</p>
                <p>Select part of this paragraph to create a <a href="https://example.com">link</a>, convert it into a heading, or turn it into a list.</p>
            </div>

            <div class="status">
                <div>Block: <strong id="blockState">none</strong></div>
                <div>List: <strong id="listState">none</strong></div>
                <div>Link: <strong id="linkState">none</strong></div>
                <div>Table: <strong id="tableState">none</strong></div>
                <div>Active: <strong id="activeState">none</strong></div>
            </div>
        </div>
    </div>

    <script src="../src/core/selection-formatting.js"></script>
    <script src="../src/core/markup-normalization.js"></script>
    <script src="../src/core/selection-state.js"></script>
    <script src="../src/core/linking.js"></script>
    <script src="../src/core/block-structure.js"></script>
    <script src="../src/core/embed-content.js"></script>
    <script src="../src/core/editor-core.js"></script>
    <script src="../src/ui/toolbar-view.js"></script>
    <script src="../src/ui/editor-adapter.js"></script>
    <script>
        createEditorAdapter({
            editorElement: document.getElementById('editor'),
            toolbarElement: document.getElementById('toolbar'),
            statusElements: {
                active: document.getElementById('activeState'),
                block: document.getElementById('blockState'),
                link: document.getElementById('linkState'),
                list: document.getElementById('listState'),
                table: document.getElementById('tableState')
            }
        });
    </script>
</body>

</html>
